{% extends "./layouts/base.html" %}

{% block body %}
<div class="body-container body-container--blog-post">
  <article style="max-width:760px;margin:64px auto;padding:0 24px;">
    <a href="{{ blog_recent_posts_url }}" style="color:#6366f1;font-weight:600;font-size:.9375rem;">&larr; Back to Blog</a>
    <h1 style="margin:24px 0 16px;">{{ content.name }}</h1>
    <p style="color:#64748b;font-size:.9375rem;margin-bottom:32px;">{{ content.publish_date|datetimeformat("%B %d, %Y") }} &middot; {{ content.blog_post_author.display_name }}</p>
    {% if content.featured_image %}
    <img src="{{ content.featured_image }}" alt="{{ content.featured_image_alt_text }}" style="width:100%;border-radius:12px;margin-bottom:40px;">
    {% endif %}
    <div class="hs-richtext blog-content">
      {{ content.post_body }}
    </div>
  </article>
</div>
{% endblock body %}
